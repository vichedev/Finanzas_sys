services:
  postgres:
    image: postgres:16-alpine
    container_name: finanzas_postgres
    restart: unless-stopped
    # Toda la config vive en un único backend/.env (BD por partes, etc.).
    env_file:
      - ./backend/.env
    command: >
      postgres
      -c log_connections=on
      -c log_disconnections=on
      -c log_statement=ddl
      -c log_min_duration_statement=1000
      -c log_line_prefix='%m [%p] %u@%d/%a/%h '
      -c statement_timeout=60000
      -c idle_in_transaction_session_timeout=300000
    ports:
      - "127.0.0.1:5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    mem_limit: 1g
    cpus: '1.0'
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    container_name: finanzas_backend
    restart: unless-stopped
    # Un único backend/.env configura todo (BD por partes, JWT, admin inicial…).
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    # El arranque lo maneja docker-entrypoint.sh: espera la DB, sincroniza el
    # schema global y (si SEED_* está presente) siembra el primer SuperAdmin.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    read_only: true
    tmpfs:
      - /tmp:size=64m
      - /app/.npm:size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: '1.0'
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: finanzas_frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    user: "101:101"
    read_only: true
    tmpfs:
      - /tmp:size=16m
      - /var/cache/nginx:size=32m
      - /var/run:size=4m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    mem_limit: 128m
    cpus: '0.5'
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
