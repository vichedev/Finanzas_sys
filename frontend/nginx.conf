server_tokens off;

log_format finanzas_main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" rt=$request_time urt=$upstream_response_time';

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 5;
gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml+rss;

limit_req_zone $binary_remote_addr zone=api_login:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=120r/m;
limit_req_status 429;

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 1m;
  client_body_timeout 10s;
  client_header_timeout 10s;
  send_timeout 30s;
  keepalive_timeout 30s;

  access_log /var/log/nginx/access.log finanzas_main;
  error_log /var/log/nginx/error.log warn;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header X-Permitted-Cross-Domain-Policies "none" always;
  # HSTS solo tiene sentido tras TLS. Si sirves HTTP plano, este header fuerza
  # al navegador a usar HTTPS (que no existe) y produce ERR_CONNECTION_CLOSED.
  # Reactívalo SOLO cuando pongas la app detrás de HTTPS (Cloudflare/Caddy/Let's Encrypt).
  # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-DNS-Prefetch-Control "off" always;

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
  }

  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico|webp)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location = /api/auth/login {
    limit_req zone=api_login burst=3 nodelay;
    proxy_pass http://backend:4000/api/auth/login;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location = /api/auth/register {
    limit_req zone=api_login burst=2 nodelay;
    proxy_pass http://backend:4000/api/auth/register;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /api/ {
    limit_req zone=api_general burst=40 nodelay;
    proxy_pass http://backend:4000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~ /\.(ht|git|env) {
    deny all;
  }
}
